name: Neural Cortex v5.1 — Intelligence Run

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Neural Cortex
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Commit
        run: |
          git config user.name  "Neural Cortex"
          git config user.email "cortex@neuralcortex.ai"
          git add index.html data/
          git diff --staged --quiet || git commit -m "Cortex: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
